<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Upload Dữ Liệu Bầu Cử - v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 p-6">

<div class="max-w-4xl mx-auto space-y-8">
    <header class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
        <h1 class="text-2xl font-bold text-gray-800">Cài Đặt Dữ Liệu Bầu Cử</h1>
        <p class="text-sm text-gray-500">Tải tệp Excel để cập nhật danh sách Đoàn viên và Ứng cử viên</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Khu vực Upload Đoàn Viên -->
        <div class="bg-white p-6 rounded-xl shadow-md border">
            <h2 class="font-bold text-blue-700 mb-4 flex items-center">
                <span class="mr-2">📋</span> DANH SÁCH ĐOÀN VIÊN
            </h2>
            <p class="text-xs text-gray-400 mb-4 italic">(Cột: HoTen, DonVi, CCCD)</p>
            <input type="file" id="voter-file" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mb-4">
            <button onclick="uploadData('voters', 'voter-file')" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition">TẢI LÊN ĐOÀN VIÊN</button>
        </div>

        <!-- Khu vực Upload Ứng Cử Viên -->
        <div class="bg-white p-6 rounded-xl shadow-md border">
            <h2 class="font-bold text-orange-600 mb-4 flex items-center">
                <span class="mr-2">👤</span> DANH SÁCH ỨNG CỬ VIÊN
            </h2>
            <p class="text-xs text-gray-400 mb-4 italic">(Cột: HoTen, DonVi, ChucVu, LinkHinh)</p>
            <input type="file" id="candidate-file" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 mb-4">
            <button onclick="uploadData('candidates', 'candidate-file')" class="w-full bg-orange-600 text-white py-2 rounded-lg font-bold hover:bg-orange-700 transition">TẢI LÊN ỨNG CỬ VIÊN</button>
        </div>
    </div>

    <!-- Trạng thái xử lý -->
    <div id="status-box" class="hidden bg-white p-4 rounded-lg border text-center font-medium"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAr6EyKjuaB7hdZZ63DwA9PhRajC5jyQ6w",
        authDomain: "bautocongdoan.firebaseapp.com",
        projectId: "bautocongdoan",
        storageBucket: "bautocongdoan.firebasestorage.app",
        messagingSenderId: "682887879775",
        appId: "1:682887879775:web:f343d7ac969a82591a4fea",
        measurementId: "G-WXXFDWQPZQ"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function uploadData(collectionName, inputId) {
        const fileInput = document.getElementById(inputId);
        const statusBox = document.getElementById('status-box');
        
        if (!fileInput.files[0]) return alert("Vui lòng chọn file Excel!");

        const file = fileInput.files[0];
        const reader = new FileReader();

        statusBox.className = "bg-yellow-50 text-yellow-700 p-4 rounded-lg border block";
        statusBox.innerText = "Đang xử lý dữ liệu...";

        reader.onload = async (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName]);

                const batch = db.batch();
                
                // Xóa dữ liệu cũ trước khi tải mới (Tùy chọn)
                // Lưu ý: Nếu danh sách lớn > 500 dòng, cần chia nhỏ batch
                jsonData.forEach((item) => {
                    const docRef = db.collection(collectionName).doc(); // Tạo ID ngẫu nhiên
                    batch.set(docRef, item);
                });

                await batch.commit();
                
                statusBox.className = "bg-green-50 text-green-700 p-4 rounded-lg border block";
                statusBox.innerText = `Thành công! Đã tải lên ${jsonData.length} dòng dữ liệu vào ${collectionName}.`;
            } catch (error) {
                console.error(error);
                statusBox.className = "bg-red-50 text-red-700 p-4 rounded-lg border block";
                statusBox.innerText = "Lỗi xử lý file hoặc Firebase Rules!";
            }
        };

        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
