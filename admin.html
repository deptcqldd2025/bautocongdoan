<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Kết Quả Bầu Cử v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 p-4">

<div class="max-w-5xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
    <div class="flex justify-between items-center border-b pb-4 mb-6">
        <h1 class="text-2xl font-bold">BÁO CÁO KẾT QUẢ THỜI GIAN THỰC</h1>
        <button onclick="location.reload()" class="text-sm bg-gray-200 px-4 py-2 rounded">Làm mới</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Biểu đồ -->
        <div class="lg:col-span-2">
            <canvas id="resultChart"></canvas>
        </div>

        <!-- Thống kê nhanh -->
        <div class="bg-blue-900 text-white p-6 rounded-xl">
            <h3 class="text-lg font-bold mb-4 italic">Thông số chung</h3>
            <div class="space-y-4">
                <div>
                    <p class="text-blue-300 text-sm">Tổng số phiếu phát ra</p>
                    <p id="total-count" class="text-3xl font-bold">0</p>
                </div>
                <div id="leaderboard">
                    <p class="text-blue-300 text-sm mb-2">Chi tiết số phiếu:</p>
                    <!-- Danh sách text ở đây -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAr6EyKjuaB7hdZZ63DwA9PhRajC5jyQ6w",
        authDomain: "bautocongdoan.firebaseapp.com",
        projectId: "bautocongdoan",
        storageBucket: "bautocongdoan.firebasestorage.app",
        messagingSenderId: "682887879775",
        appId: "1:682887879775:web:f343d7ac969a82591a4fea",
        measurementId: "G-WXXFDWQPZQ"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let chart;

    function updateView(dataMap) {
        const labels = Object.keys(dataMap);
        const values = Object.values(dataMap);
        
        // Cập nhật biểu đồ
        if (chart) chart.destroy();
        const ctx = document.getElementById('resultChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Số phiếu bầu',
                    data: values,
                    backgroundColor: '#1e40af'
                }]
            }
        });

        // Cập nhật danh sách text
        let listHtml = '<p class="text-blue-300 text-sm mb-2">Chi tiết số phiếu:</p>';
        labels.forEach(name => {
            listHtml += `<p class="flex justify-between border-b border-blue-700 py-1"><span>${name}</span> <span>${dataMap[name]}</span></p>`;
        });
        document.getElementById('leaderboard').innerHTML = listHtml;
    }

    // Theo dõi real-time
    db.collection("votes").onSnapshot((snapshot) => {
        document.getElementById('total-count').innerText = snapshot.size;
        let counts = {};
        snapshot.forEach(doc => {
            doc.data().candidates.forEach(name => {
                counts[name] = (counts[name] || 0) + 1;
            });
        });
        updateView(counts);
    });
</script>
</body>
</html>
